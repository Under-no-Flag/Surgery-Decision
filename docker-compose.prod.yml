version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: surgery_db_prod
    restart: always
    env_file:
      - prod.env
    # 生产环境通常不将其暴露到宿主机端口，仅供 backend 访问保证安全
    # ports:
    #   - "3306:3306"
    volumes:
      - db_data_prod:/var/lib/mysql

  backend:
    build: ./server
    container_name: surgery_backend_prod
    restart: always
    env_file:
      - prod.env
    depends_on:
      - db
    command: >
      sh -c "flask --app app.py db init || true && python init_db.py && gunicorn -w 4 -b 0.0.0.0:5000 app:app"

  frontend:
    build: ./frontend
    container_name: surgery_frontend_prod
    restart: always
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes:
  db_data_prod: