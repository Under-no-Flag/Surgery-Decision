version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: surgery_db
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./server
    container_name: surgery_backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./server:/app
    ports:
      - "5000:5000"
    depends_on:
      - db
    # Use flask run for development server with hot-reload instead of gunicorn
    command: >
      sh -c "python init_db.py && flask run --host=0.0.0.0 --port=5000 --debug"

  frontend:
    build:
      context: ./frontend
      target: builder
    container_name: surgery_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules # prevent host node_modules from overriding container
    working_dir: /app
    ports:
      - "80:5173"
    depends_on:
      - backend
    environment:
      - API_TARGET=http://backend:5000
    # Start Vite dev server with hot-reload
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  db_data: